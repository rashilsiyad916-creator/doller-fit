<div class="home-container">

  <div class="banner">
    <img src="assets/image/new12.jpg" alt="Our Collection" />

    <div class="banner-text">
      <h1>Welcome to Dollerfit mens wear</h1>
      <p>Explore the latest mens styles</p>
      <button routerLink="/products" class="shop-btn">Shop Now</button>
    </div>
  </div>

  <section class="featured">
    <h2>Featured Products</h2>

    <div class="featured-items">
      <div *ngFor="let product of featuredProducts" class="item">
        <img [src]="product.image" [alt]="product.name">
        <h3>{{ product.name }}</h3>
        <button [routerLink]="['/products', product.id]"  class="view-btn">View Product</button>
      </div>
    </div>
  </section>

  <section class="newsletter">
    <h2>Join Our Community</h2>
    <p>Get exclusive updates, new arrivals & special offers.</p>
    <input type="email" placeholder="Enter your email">
    <button>Subscribe</button>
  </section>

</div>

<h2>Checkout</h2>

<div class="delivery-address" *ngIf="address">
  <h3>Delivery Address</h3>
  <p><strong>{{ address.name }}</strong></p>
  <p>{{ address.street }}, {{ address.city }}</p>
  <p>{{ address.state }} - {{ address.pincode }}</p>
  <p class="phone">Phone: {{ address.phone }}</p>
</div>

<h3>Select Payment Method</h3>
<label>
  <input type="radio" name="payment" [(ngModel)]="paymentMethod" value="Credit Card" /> Credit Card
</label>
<label>
  <input type="radio" name="payment" [(ngModel)]="paymentMethod" value="UPI" /> UPI
</label>
<label>
  <input type="radio" name="payment" [(ngModel)]="paymentMethod" value="Cash on Delivery" /> Cash on Delivery
</label>

<div class="checkout-summary">
  <h3>Total: ₹{{ totalAmount }}</h3>
 <button type="button" (click)="placeOrder()">Place Order</button>

</div>
